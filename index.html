<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PreCrastinar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg-main:  #F5F0E8;
            --bg-card:  #FFFCF5;
            --bg-input: #EDE8DC;
            --text:     #1C1814;
            --muted:    #8C7B6B;
            --accent:   #C8603A;
            --accent2:  #E07A54;
            --border:   #D4CBBA;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-main);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── Cards & inputs ── */
        .card  { background: var(--bg-card);  border: 1px solid var(--border); }
        .inp   { background: var(--bg-input); border: 1px solid var(--border); color: var(--text); }
        .inp:focus-within { outline: 2px solid var(--accent); outline-offset: 1px; }
        select.inp { -webkit-appearance: none; appearance: none; }

        /* ── Accent button ── */
        .btn-a { background: var(--accent); color: #fff; transition: background .2s; }
        .btn-a:hover { background: var(--accent2); }

        /* ── Filter tabs ── */
        .ftab { color: var(--muted); transition: all .2s; }
        .ftab.active { background: var(--accent); color: #fff; }

        /* ── Priority badges ── */
        .p-alta  { color:#DC2626; border-color:#FCA5A5; background:#FEF2F2; }
        .p-media { color:#D97706; border-color:#FCD34D; background:#FFFBEB; }
        .p-baja  { color:#059669; border-color:#A7F3D0; background:#ECFDF5; }

        /* ── Task item ── */
        .task-item { transition: all .25s cubic-bezier(.4,0,.2,1); }
        .done-check { background: var(--accent) !important; }

        /* ── Reminder chip ── */
        .rem-chip { color: var(--accent); background: rgba(200,96,58,.1); }

        /* ── AM/PM toggle ── */
        .ampm {
            padding: 8px 20px; border-radius: 14px; font-weight: 600;
            font-size: 14px; transition: all .2s; cursor: pointer;
            color: var(--muted); border: 1px solid var(--border);
            background: var(--bg-input);
        }
        .ampm.on { background: var(--accent); color: #fff; border-color: var(--accent); }

        /* ── Clock SVG ── */
        #clock-svg { touch-action: none; user-select: none; cursor: default; }
        .h-hand { stroke: #1C1814; stroke-width: 5; stroke-linecap: round; }
        .m-hand { stroke: #C8603A; stroke-width: 3.5; stroke-linecap: round; }
        .knob   { fill: #C8603A; cursor: grab; }
        .knob-h { fill: #1C1814; cursor: grab; }
        .knob:active, .knob-h:active { cursor: grabbing; }

        /* scrollbar */
        ::-webkit-scrollbar { width:6px; }
        ::-webkit-scrollbar-track { background: var(--bg-input); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        ::placeholder { color: var(--muted); opacity: .7; }

        /* ── Micrófono ── */
        .mic-btn { cursor:pointer; outline:none; transition: all .2s; }
        .mic-btn:hover { filter: brightness(1.15); transform: scale(1.07); }
        .mic-btn.escuchando {
            background: var(--accent) !important;
            color: #fff !important;
            border-color: var(--accent2) !important;
            animation: mic-pulso 1.1s ease-in-out infinite;
        }
        .mic-btn:disabled { opacity:.35; cursor:not-allowed; }
        @keyframes mic-pulso {
            0%,100% { box-shadow: 0 0 0 3px rgba(181,101,29,.3); }
            50%      { box-shadow: 0 0 0 9px rgba(181,101,29,.08); }
        }

        /* ── Google Calendar ── */
        .gcal-btn {
            display: inline-flex; align-items: center; gap: 6px;
            background: #fff; border: 1.5px solid #dadce0;
            border-radius: 999px; padding: 6px 14px;
            font-size: 12px; font-weight: 600; color: #3c4043;
            cursor: pointer; transition: box-shadow .2s, background .2s;
            text-decoration: none; white-space: nowrap;
        }
        .gcal-btn:hover { box-shadow: 0 2px 8px rgba(0,0,0,.15); background: #f8f9fa; }
        .gcal-btn img  { width: 16px; height: 16px; }

        #gcal-modal {
            position: fixed; inset: 0; z-index: 999;
            background: rgba(0,0,0,.45); display: flex;
            align-items: flex-end; justify-content: center;
            padding-bottom: 24px;
        }
        #gcal-modal         { display: flex; }
        #gcal-modal.hidden  { display: none !important; }
        #gcal-panel {
            background: var(--bg-card); border-radius: 24px;
            padding: 24px; width: 100%; max-width: 430px;
            box-shadow: 0 8px 32px rgba(0,0,0,.18);
        }
        .gcal-task-row {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 0; border-bottom: 1px solid var(--border);
        }
        .gcal-task-row:last-child { border-bottom: none; }
        .gcal-send-btn {
            margin-left: auto; background: #1a73e8; color: #fff;
            border: none; border-radius: 999px; padding: 5px 12px;
            font-size: 12px; font-weight: 600; cursor: pointer;
            white-space: nowrap;
        }
        .gcal-send-btn:hover { background: #1557b0; }
        .gcal-send-btn.enviado { background: #34a853; }
    </style>
  <!-- Firebase -->
  <script type="module">
    import { initializeApp }                        from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyC1JHv33af8G0cwdcsuWZtXVYnwECAOpt0",
      authDomain:        "precrastinar.firebaseapp.com",
      projectId:         "precrastinar",
      storageBucket:     "precrastinar.firebasestorage.app",
      messagingSenderId: "350703432127",
      appId:             "1:350703432127:web:b67918792e91d816acb10a"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);
    const REF = doc(db, "precrastinar", "datos");

    // Escuchar cambios en tiempo real desde Firestore (sincronización entre dispositivos)
    onSnapshot(REF, (snap) => {
      if (!snap.exists()) return;
      if (window._ignorarSnapshot) { window._ignorarSnapshot = false; return; }
      const d = snap.data();
      // Actualizar variables del script principal via función global
      if (typeof window.syncFromCloud === 'function') {
        window.syncFromCloud(d.tasks || [], d.projects, d.currentProject);
      }
    });

    // Guardar en Firestore
    window.saveToCloud = async function(tasks, projects, currentProject) {
      try {
        window._ignorarSnapshot = true;
        await setDoc(REF, { tasks, projects, currentProject });
      } catch(e) {
        console.warn("Error guardando en Firestore:", e);
      }
    };

    // Carga inicial desde Firestore
    window.loadFromCloud = async function() {
      try {
        const { getDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
        const snap = await getDoc(REF);
        if (snap.exists()) {
          window._cloudData = snap.data();
        }
      } catch(e) {
        console.warn("Error cargando desde Firestore:", e);
      }
    };
  </script>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">

<div id="clock-modal" class="hidden fixed inset-0 flex items-center justify-center"

<script>
/* ── State ── */
let tasks          = [];
let projects       = ["Instituto","Exámenes","Casa","Dinero","Novia","Ismael","Compra","Otros"];
let currentProject = "Instituto";
let currentFilter  = "all";
const STORAGE_KEY  = "precrastinar_v1";

const reminderLabels = {
    no:'', '1h':'⏰ 1h antes', '2h':'⏰ 2h antes',
    '1d':'⏰ 1 día antes', '2d':'⏰ 2 días antes'
};

/* ═══════════════════════════════════════════════
   CLOCK
═══════════════════════════════════════════════ */
const CX = 150, CY = 150;
let cHours   = 0;   // 0-11
let cMinutes = 0;
let cIsPM    = false;
let dragging = null;

function initClockFace() {
    const ticks = document.getElementById('clk-ticks');
    const nums  = document.getElementById('clk-nums');
    const ns = 'http://www.w3.org/2000/svg';

    /* tick marks */
    for (let i = 0; i < 60; i++) {
        const ang  = (i / 60) * 2 * Math.PI - Math.PI / 2;
        const hour = (i % 5 === 0);
        const r1   = hour ? 108 : 117;
        const r2   = 125;
        const ln   = document.createElementNS(ns, 'line');
        ln.setAttribute('x1', CX + r1 * Math.cos(ang));
        ln.setAttribute('y1', CY + r1 * Math.sin(ang));
        ln.setAttribute('x2', CX + r2 * Math.cos(ang));
        ln.setAttribute('y2', CY + r2 * Math.sin(ang));
        ln.setAttribute('stroke', hour ? '#1C1814' : '#C4B9AA');
        ln.setAttribute('stroke-width', hour ? '2.5' : '1');
        ticks.appendChild(ln);
    }

    /* hour numbers */
    for (let h = 1; h <= 12; h++) {
        const ang = (h / 12) * 2 * Math.PI - Math.PI / 2;
        const r   = 92;
        const tx  = document.createElementNS(ns, 'text');
        tx.setAttribute('x', CX + r * Math.cos(ang));
        tx.setAttribute('y', CY + r * Math.sin(ang));
        tx.setAttribute('text-anchor', 'middle');
        tx.setAttribute('dominant-baseline', 'central');
        tx.setAttribute('font-family', 'Inter, sans-serif');
        tx.setAttribute('font-size', '14');
        tx.setAttribute('font-weight', '700');
        tx.setAttribute('fill', '#1C1814');
        tx.textContent = h;
        nums.appendChild(tx);
    }
}

function openClock() {
    const saved = document.getElementById('new-time').value;
    if (saved) {
        const [hStr, mStr] = saved.split(':');
        const h24 = parseInt(hStr);
        cMinutes  = parseInt(mStr);
        cIsPM     = h24 >= 12;
        cHours    = h24 % 12;
    } else {
        const now = new Date();
        cHours   = now.getHours() % 12;
        cMinutes = now.getMinutes();
        cIsPM    = now.getHours() >= 12;
    }
    syncAMPMButtons();
    updateClock();
    document.getElementById('clock-modal').classList.remove('hidden');
}

function closeClock()   { document.getElementById('clock-modal').classList.add('hidden'); dragging = null; }
function showSettings() { renderProjects(); document.getElementById('settings-modal').classList.remove('hidden'); }
function hideSettings() { document.getElementById('settings-modal').classList.add('hidden'); saveData(); }

function clearClock() {
    document.getElementById('new-time').value   = '';
    document.getElementById('time-display').textContent = '--:--';
    document.getElementById('time-display').style.color = 'var(--muted)';
    closeClock();
}

function confirmClock() {
    const h24 = cIsPM ? (cHours === 0 ? 12 : cHours + 12) : cHours;
    const hh  = String(h24).padStart(2,'0');
    const mm  = String(cMinutes).padStart(2,'0');
    document.getElementById('new-time').value = `${hh}:${mm}`;
    const disp12 = cHours === 0 ? 12 : cHours;
    const suf    = cIsPM ? 'PM' : 'AM';
    document.getElementById('time-display').textContent  = `${disp12}:${mm} ${suf}`;
    document.getElementById('time-display').style.color  = 'var(--accent)';
    closeClock();
}

function setAMPM(val) {
    cIsPM = (val === 'PM');
    syncAMPMButtons();
    updateClock();
}

function syncAMPMButtons() {
    document.getElementById('am-btn').classList.toggle('on', !cIsPM);
    document.getElementById('pm-btn').classList.toggle('on',  cIsPM);
}

function updateClock() {
    const toRad = deg => (deg - 90) * Math.PI / 180;
    const hAng  = (cHours / 12) * 360 + (cMinutes / 60) * 30;
    const mAng  = (cMinutes / 60) * 360;
    const hLen  = 62, mLen = 87;

    const hx = CX + hLen * Math.cos(toRad(hAng));
    const hy = CY + hLen * Math.sin(toRad(hAng));
    const mx = CX + mLen * Math.cos(toRad(mAng));
    const my = CY + mLen * Math.sin(toRad(mAng));

    document.getElementById('hour-hand').setAttribute('x2', hx);
    document.getElementById('hour-hand').setAttribute('y2', hy);
    document.getElementById('minute-hand').setAttribute('x2', mx);
    document.getElementById('minute-hand').setAttribute('y2', my);
    document.getElementById('hour-knob').setAttribute('cx', hx);
    document.getElementById('hour-knob').setAttribute('cy', hy);
    document.getElementById('minute-knob').setAttribute('cx', mx);
    document.getElementById('minute-knob').setAttribute('cy', my);

    const d12 = cHours === 0 ? 12 : cHours;
    const suf = cIsPM ? ' PM' : ' AM';
    document.getElementById('clock-digital').textContent = `${d12}:${String(cMinutes).padStart(2,'0')}`;
}

function startDrag(type) { dragging = type; }

function onClockMove(e) {
    if (!dragging) return;
    e.preventDefault();
    const svg  = document.getElementById('clock-svg');
    const rect = svg.getBoundingClientRect();
    const cx   = e.touches ? e.touches[0].clientX : e.clientX;
    const cy   = e.touches ? e.touches[0].clientY : e.clientY;
    const sx   = 300 / rect.width;
    const sy   = 300 / rect.height;
    const x    = (cx - rect.left) * sx;
    const y    = (cy - rect.top)  * sy;

    let ang = Math.atan2(y - CY, x - CX) * 180 / Math.PI + 90;
    if (ang < 0) ang += 360;

    if (dragging === 'hour') {
        cHours   = Math.round(ang / 30) % 12;
    } else {
        cMinutes = Math.round(ang / 6) % 60;
    }
    updateClock();
}

function endDrag() { dragging = null; }

/* ═══════════════════════════════════════════════
   DATA
═══════════════════════════════════════════════ */
async function loadData() {
    // Intentar cargar desde Firestore primero
    if (typeof window.loadFromCloud === 'function') {
        await window.loadFromCloud();
        // Sincronizar variables locales con lo cargado por Firebase
        if (window._cloudData) {
            tasks          = window._cloudData.tasks          || tasks;
            projects       = window._cloudData.projects       || projects;
            currentProject = window._cloudData.currentProject || currentProject;
        }
    } else {
        // Fallback: localStorage
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            const d    = JSON.parse(saved);
            tasks          = d.tasks          || [];
            projects       = d.projects       || projects;
            currentProject = d.currentProject || "Instituto";
        }
    }
    renderProjects();
    renderTasks();
    requestNotificationPermission();
}

function saveData() {
    // Guardar siempre en localStorage como respaldo
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ tasks, projects, currentProject }));
    // Guardar en la nube
    if (typeof window.saveToCloud === 'function') {
        window.saveToCloud(tasks, projects, currentProject);
    }
}

// Llamada desde el módulo Firebase cuando llegan datos de otro dispositivo
window.syncFromCloud = function(newTasks, newProjects, newCurrentProject) {
    tasks          = newTasks;
    if (newProjects)       projects       = newProjects;
    if (newCurrentProject) currentProject = newCurrentProject;
    renderProjects();
    renderTasks();
};

function renderProjects() {
    const sel = document.getElementById('project-select');
    sel.innerHTML = projects.map(p =>
        `<option value="${p}" ${p===currentProject?'selected':''}>${p}</option>`
    ).join('');

            <span class="font-medium">${p}</span>
            ${i >= 8
                ? `<button onclick="deleteProject(${i})" class="text-xs font-bold" style="color:#DC2626">Eliminar</button>`

        </div>
    `).join('');
}

function changeProject() {
    currentProject = document.getElementById('project-select').value;
    saveData();
    renderTasks();
}

function addNewProject() {
    const name = prompt("Nombre de la nueva categoría:");
    if (name && !projects.includes(name)) {
        projects.push(name);
        renderProjects();
        saveData();
    }
}

function deleteProject(index) {
    if (confirm("¿Eliminar esta categoría?")) {
        projects.splice(index, 1);
        currentProject = projects[0] || "Instituto";
        renderProjects();
        saveData();
        renderTasks();

}

/* ═══════════════════════════════════════════════
   TASKS
═══════════════════════════════════════════════ */
function addNewTask() {
    const text = document.getElementById('new-task').value.trim();
    if (!text) return;

    tasks.unshift({
        id:       Date.now(),
        text,
        done:     false,
        due:      document.getElementById('new-due').value,
        time:     document.getElementById('new-time').value,
        priority: document.getElementById('new-priority').value,
        reminder: document.getElementById('new-reminder').value,
        project:  currentProject,
        subtasks: []
    });

    document.getElementById('new-task').value  = '';
    document.getElementById('new-due').value   = '';
    document.getElementById('new-time').value  = '';
    document.getElementById('time-display').textContent = '--:--';
    document.getElementById('time-display').style.color = 'var(--muted)';

    saveData();
    renderTasks();
}

function toggleTask(id) {
    const t = tasks.find(t => t.id === id);
    if (t) t.done = !t.done;
    saveData();
    renderTasks();
}

function deleteTask(id) {
    if (confirm('¿Eliminar esta tarea?')) {
        tasks = tasks.filter(t => t.id !== id);
        saveData();
        renderTasks();
    }
}

function addSubtask(taskId) {
    const task = tasks.find(t => t.id === taskId);
    if (!task) return;
    const text = prompt("Texto de la subtarea:");
    if (text) {
        task.subtasks.push({ id: Date.now(), text, done: false });
        saveData();
        renderTasks();
    }
}

function toggleSubtask(taskId, subId) {
    const task = tasks.find(t => t.id === taskId);
    const sub  = task && task.subtasks.find(s => s.id === subId);
    if (sub) sub.done = !sub.done;
    saveData();
    renderTasks();
}

/* ── Render ── */
function fmtTime(timeStr) {
    if (!timeStr) return '';
    const [h, m] = timeStr.split(':');
    const hNum  = parseInt(h);
    const suf   = hNum >= 12 ? 'PM' : 'AM';
    const h12   = hNum % 12 === 0 ? 12 : hNum % 12;
    return `${h12}:${m} ${suf}`;
}

function renderTasks() {
    const container = document.getElementById('task-list');
    container.innerHTML = '';

    let list = tasks.filter(t => t.project === currentProject);
    if (currentFilter === 'pending')   list = list.filter(t => !t.done);
    if (currentFilter === 'completed') list = list.filter(t =>  t.done);
    list.sort((a,b) => (a.done?1:0)-(b.done?1:0) || (a.due||'9999').localeCompare(b.due||'9999'));

    if (!list.length) {
        container.innerHTML = `<p class="text-center py-20" style="color:var(--muted)">Sin tareas en esta categoría</p>`;
        return;
    }

    list.forEach(task => {
        const overdue   = task.due && new Date(task.due) < new Date() && !task.done;
        const prioClass = {alta:'p-alta', media:'p-media', baja:'p-baja'}[task.priority];
        const prioLbl   = {alta:'ALTA',   media:'MEDIA',   baja:'BAJA'}[task.priority];
        const remLbl    = reminderLabels[task.reminder] || '';

        let dateStr = '';
        if (task.due) {
            dateStr = new Date(task.due + 'T12:00').toLocaleDateString('es-ES',{day:'numeric',month:'short'});
            if (task.time) dateStr += ` · ${fmtTime(task.time)}`;
        }

        container.innerHTML += `
        <div class="task-item card rounded-3xl p-5">
            <div class="flex gap-4">
                <!-- Checkbox -->
                <div onclick="toggleTask(${task.id})" class="cursor-pointer pt-0.5 flex-shrink-0">
                    <div class="${task.done?'done-check':''} w-7 h-7 rounded-2xl flex items-center justify-center"
                         style="${task.done?'':'border:2px solid var(--border)'}">
                        ${task.done?'<i class="fas fa-check text-white text-sm"></i>':''}
                    </div>
                </div>
                <!-- Content -->
                <div class="flex-1 min-w-0">
                    <p class="text-[17px] font-medium leading-snug ${task.done?'line-through':''}"
                       style="color:${task.done?'var(--muted)':'var(--text)'}">
                        ${task.text}
                    </p>
                    <div class="flex flex-wrap gap-2 mt-2.5 items-center text-xs">
                        ${dateStr ? `<span style="color:${overdue?'#DC2626':'var(--muted)'}">
                            <i class="fas fa-calendar-day mr-1"></i>${dateStr}
                        </span>` : ''}
                        <span class="px-3 py-0.5 rounded-full border font-semibold ${prioClass}">${prioLbl}</span>
                        ${remLbl ? `<span class="rem-chip px-2.5 py-0.5 rounded-full font-medium">${remLbl}</span>` : ''}
                    </div>

                    <!-- Subtasks -->
                    <div class="mt-4">
                        <div onclick="this.nextElementSibling.classList.toggle('hidden')"
                             class="text-xs flex items-center gap-1.5 cursor-pointer select-none"
                             style="color:var(--muted)">
                            <i class="fas fa-list-check"></i>
                            ${task.subtasks.length} subtarea${task.subtasks.length!==1?'s':''}
                        </div>
                        <div class="hidden mt-3 space-y-2 pl-5">
                            ${task.subtasks.map(sub => `
                            <div class="flex items-center gap-3 text-sm">
                                <div onclick="toggleSubtask(${task.id},${sub.id})" class="cursor-pointer flex-shrink-0">
                                    <div class="${sub.done?'done-check':''} w-5 h-5 rounded-xl flex items-center justify-center"
                                         style="${sub.done?'':'border:1px solid var(--border)'}">
                                        ${sub.done?'<i class="fas fa-check text-[10px] text-white"></i>':''}
                                    </div>
                                </div>
                                <span class="${sub.done?'line-through':''}"
                                      style="color:${sub.done?'var(--muted)':'var(--text)'}">
                                    ${sub.text}
                                </span>
                            </div>`).join('')}
                            <button onclick="addSubtask(${task.id})"
                                    class="text-xs font-semibold flex items-center gap-1 mt-1"
                                    style="color:var(--accent)">
                                <i class="fas fa-plus"></i> Añadir subtarea
                            </button>
                        </div>
                    </div>
                </div>
                <!-- Delete -->
                <button onclick="deleteTask(${task.id})"
                        class="flex-shrink-0 opacity-25 hover:opacity-100 transition-opacity"
                        style="color:#DC2626">
                    <i class="fas fa-trash"></i>
                </button>
            </div>
        </div>`;
    });
}

function exportCSV() {
    let csv = "Tarea,Hecha,Fecha,Hora,Prioridad,Recordatorio,Categoría,Subtareas\n";
    tasks.forEach(t => {
        csv += `"${t.text}",${t.done},"${t.due||''}","${t.time||''}",${t.priority},"${t.reminder||'no'}","${t.project}","${t.subtasks.map(s=>s.text).join('; ')}"\n`;
    });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
    a.download = 'precrastinar.csv';
    a.click();
}

function exportPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.setFont('helvetica','bold');
    doc.text("PreCrastinar — Tareas", 20, 18);
    doc.setFont('helvetica','normal');
    let y = 34;
    tasks.forEach((t,i) => {
        doc.text(`${i+1}. ${t.text} ${t.done?'[✓]':''}`, 20, y);
        const info = [t.due, t.time ? fmtTime(t.time) : '', t.priority.toUpperCase(), reminderLabels[t.reminder]||''].filter(Boolean).join(' · ');
        if (info) { doc.setFontSize(9); doc.text(info, 25, y+6); doc.setFontSize(12); y += 4; }
        y += 14;
        if (y > 260) { doc.addPage(); y = 20; }
    });
    doc.save('precrastinar.pdf');
}

const GCAL_CLIENT_ID = '350703432127-a2u8v2mcmn79drnhqkstdlvctrtopap1.apps.googleusercontent.com';
const GCAL_SCOPE     = 'https://www.googleapis.com/auth/calendar.events';
let   gcalToken      = null;

function openGcal() {
    document.getElementById('gcal-modal').classList.remove('hidden');
    if (gcalToken) {
        showGcalTasks();
    }
}

function closeGcal() {
    document.getElementById('gcal-modal').classList.add('hidden');
}

function gcalLogin() {
    // Usar Google Identity Services (GIS) — carga bajo demanda
    if (!window.google || !window.google.accounts) {
        const s = document.createElement('script');
        s.src = 'https://accounts.google.com/gsi/client';
        s.onload = () => _gcalInitToken();
        document.head.appendChild(s);
    } else {
        _gcalInitToken();
    }
}

function _gcalInitToken() {
    const client = google.accounts.oauth2.initTokenClient({
        client_id: GCAL_CLIENT_ID,
        scope:     GCAL_SCOPE,
        callback:  (resp) => {
            if (resp.error) { alert('Error al conectar con Google: ' + resp.error); return; }
            gcalToken = resp.access_token;
            document.getElementById('gcal-btn-label').textContent = '📅 Conectado';
            showGcalTasks();
        }
    });
    client.requestAccessToken();
}

function showGcalTasks() {
    document.getElementById('gcal-login-area').classList.add('hidden');
    document.getElementById('gcal-tasks-area').classList.remove('hidden');

    // Filtrar tareas pendientes con fecha
    const conFecha = tasks.filter(t => !t.done && t.due);
    const lista    = document.getElementById('gcal-task-list');

    if (conFecha.length === 0) {
        lista.innerHTML = '<p class="text-sm py-4 text-center" style="color:var(--muted)">No hay tareas pendientes con fecha.</p>';
        return;
    }

    lista.innerHTML = conFecha.map(t => `
        <div class="gcal-task-row" id="gcal-row-${t.id}">
            <div style="flex:1; min-width:0;">
                <div class="text-sm font-medium truncate">${t.text}</div>
                <div class="text-xs" style="color:var(--muted)">${formatDate(t.due)}${t.time ? ' · ' + t.time : ''}</div>
            </div>
            <button class="gcal-send-btn" onclick="gcalAddOne(${t.id}, this)">+ Añadir</button>
        </div>
    `).join('');
}

function formatDate(due) {
    if (!due) return '';
    const [y,m,d] = due.split('-');
    return `${d}/${m}/${y}`;
}

async function gcalAddOne(taskId, btn) {
    const t = tasks.find(t => t.id === taskId);
    if (!t || !gcalToken) return;
    btn.textContent = '...';
    btn.disabled    = true;
    const ok = await _gcalCreateEvent(t);
    if (ok) {
        btn.textContent = '✓ Añadida';
        btn.classList.add('enviado');
    } else {
        btn.textContent = '+ Añadir';
        btn.disabled    = false;
    }
}

async function gcalAddAll() {
    const conFecha = tasks.filter(t => !t.done && t.due);
    for (const t of conFecha) {
        const btn = document.querySelector(`#gcal-row-${t.id} .gcal-send-btn`);
        if (btn && !btn.classList.contains('enviado')) {
            if (btn) { btn.textContent = '...'; btn.disabled = true; }
            const ok = await _gcalCreateEvent(t);
            if (btn) {
                btn.textContent = ok ? '✓ Añadida' : '+ Añadir';
                if (ok) btn.classList.add('enviado');
                else    btn.disabled = false;
            }
        }
    }
}

async function _gcalCreateEvent(t) {
    try {
        // Construir fechas del evento
        let start, end;
        if (t.time) {
            const dt    = `${t.due}T${t.time}:00`;
            const dtEnd = `${t.due}T${addHour(t.time)}:00`;
            start = { dateTime: dt,    timeZone: 'Europe/Madrid' };
            end   = { dateTime: dtEnd, timeZone: 'Europe/Madrid' };
        } else {
            // Evento de día completo
            const nextDay = new Date(t.due);
            nextDay.setDate(nextDay.getDate() + 1);
            start = { date: t.due };
            end   = { date: nextDay.toISOString().split('T')[0] };
        }

        const event = {
            summary:     t.text,
            description: `Prioridad: ${t.priority || 'media'} | Proyecto: ${t.project || ''} | Creado desde PreCrastinar`,
            start, end,
            colorId: t.priority === 'alta' ? '11' : t.priority === 'baja' ? '2' : '7'
        };

        const res = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
            method:  'POST',
            headers: {
                'Authorization': 'Bearer ' + gcalToken,
                'Content-Type':  'application/json'
            },
            body: JSON.stringify(event)
        });

        if (res.status === 401) {
            gcalToken = null;
            alert('Sesión expirada. Vuelve a conectar con Google.');
            document.getElementById('gcal-login-area').classList.remove('hidden');
            document.getElementById('gcal-tasks-area').classList.add('hidden');
            return false;
        }
        return res.ok;
    } catch(e) {
        console.error('Error Google Calendar:', e);
        return false;
    }
}

function addHour(time) {
    const [h, m] = time.split(':').map(Number);
    const nh = (h + 1) % 24;
    return `${String(nh).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

// ═══════════════════════════════════════════════
// MICRÓFONO — Web Speech API (Android-compatible)
// ═══════════════════════════════════════════════
(function () {

  // Android Chrome solo expone webkitSpeechRecognition
  var SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  var btn   = document.getElementById('mic-btn');
  var input = document.getElementById('new-task');

  // Si el navegador no soporta la API, deshabilitar
  if (!SpeechRec) {
    if (btn) {
      btn.disabled = true;
      btn.title    = 'Tu navegador no soporta reconocimiento de voz';
      btn.style.opacity = '0.3';
    }
    return;
  }

  var activo    = false;
  var textoBase = '';
  var rec       = null;

  // Crear una nueva instancia cada vez (Android no reutiliza bien la misma)
  function crearRec() {
    var r             = new SpeechRec();
    r.lang            = 'es-ES';
    r.interimResults  = true;
    r.maxAlternatives = 1;
    r.continuous      = false;

    r.onstart = function () {
      activo    = true;
      textoBase = input.value.trim();
      btn.classList.add('escuchando');
      btn.setAttribute('aria-label', 'Escuchando… pulsa para parar');
    };

    r.onresult = function (e) {
      var res   = e.results[e.results.length - 1];
      var texto = res[0].transcript;
      var sep   = textoBase.length > 0 ? ' ' : '';
      if (res.isFinal) {
        input.value = textoBase + sep + cap(texto.trim());
        // Notificar a cualquier listener del input
        try { input.dispatchEvent(new Event('input', { bubbles: true })); } catch(x) {}
      } else {
        // Resultado provisional: muestra en tiempo real
        input.value = textoBase + sep + texto;
      }
    };

    r.onerror = function (e) {
      // 'aborted' lo lanza Android al parar manualmente: ignorar
      if (e.error === 'aborted' || e.error === 'no-speech') {
        parar();
        return;
      }
      var msgs = {
        'not-allowed'       : '🔒 Permiso de micrófono denegado.\nVe a Ajustes > Apps > Chrome > Permisos y activa el Micrófono.',
        'network'           : '⚠️ Error de red. Comprueba tu conexión.',
        'service-not-allowed': '🔒 Servicio de voz no permitido en este contexto.',
      };
      var msg = msgs[e.error] || ('Error: ' + e.error);
      alert(msg);
      parar();
    };

    r.onend = function () {
      // onend siempre se llama al terminar, tanto si hay resultado como si no
      parar();
    };

    return r;
  }

  function parar() {
    activo = false;
    btn.classList.remove('escuchando');
    btn.setAttribute('aria-label', 'Activar micrófono');
    input.focus();
  }

  function cap(s) {
    return s ? s.charAt(0).toUpperCase() + s.slice(1) : s;
  }

  // Función global llamada desde onclick del botón
  window.toggleMic = function () {
    if (activo) {
      // Parar escucha
      try { rec.stop(); } catch(e) {}
      parar();
    } else {
      // Crear instancia nueva en cada uso (soluciona el bug de Android)
      rec = crearRec();
      try {
        rec.start();
      } catch (e) {
        // Si falla al arrancar (p.ej. ya hay una instancia activa), reintentar
        setTimeout(function () {
          try {
            rec = crearRec();
            rec.start();
          } catch (e2) {
            alert('No se pudo activar el micrófono. Inténtalo de nuevo.');
          }
        }, 300);
      }
    }
  };

})();
</script>

    <!-- ══ MODAL GOOGLE CALENDAR ══ -->
    <div id="gcal-modal" class="hidden" style="position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.45);align-items:flex-end;justify-content:center;padding-bottom:24px;">
        <div id="gcal-panel" style="background:var(--bg-card);border-radius:24px;padding:24px;width:100%;max-width:430px;box-shadow:0 8px 32px rgba(0,0,0,.18);">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
                <h2 style="font-weight:700;font-size:1.1rem;">📅 Google Calendar</h2>
                <button onclick="closeGcal()" style="font-size:1.6rem;line-height:1;background:none;border:none;cursor:pointer;color:var(--muted)">×</button>
            </div>
            <div id="gcal-login-area">
                <p style="font-size:.875rem;margin-bottom:1rem;color:var(--muted)">Conecta con tu cuenta de Google para añadir tareas a tu calendario.</p>
                <button onclick="gcalLogin()"
                        class="btn-a"
                        style="width:100%;padding:12px;border-radius:16px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;border:none;cursor:pointer;">
                    <i class="fab fa-google"></i> Conectar con Google
                </button>
            </div>
            <div id="gcal-tasks-area" class="hidden">
                <p style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;color:var(--muted)">
                    Tareas pendientes con fecha
                </p>
                <div id="gcal-task-list"></div>
                <div style="display:flex;gap:8px;margin-top:16px;">
                    <button onclick="gcalAddAll()"
                            class="btn-a"
                            style="flex:1;padding:12px;border-radius:16px;font-weight:700;font-size:.875rem;border:none;cursor:pointer;">
                        Añadir todas
                    </button>
                    <a href="https://calendar.google.com" target="_blank"
                       style="display:inline-flex;align-items:center;padding:12px 16px;border-radius:16px;font-weight:700;font-size:.875rem;background:var(--bg-input);border:1.5px solid var(--border);color:var(--text);text-decoration:none;white-space:nowrap;">
                       Abrir Calendar
                    </a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
